<!-- Main Application Layout -->
<div class="app-container">
  <!-- Loading Overlay -->
  <div *ngIf="isLoading" class="loading-overlay">
    <div class="spinner-container">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Chargement...</p>
    </div>
  </div>

  <!-- Sidebar Navigation (Authenticated Pages Only) -->
  <app-sidebar *ngIf="isAuthenticated"></app-sidebar>

  <!-- Main Layout Wrapper -->
  <div class="main-layout" [class.authenticated]="isAuthenticated">
    <!-- Header Navigation (Public Pages) -->
    <app-header
      *ngIf="shouldShowNavigation && !isAuthenticated"
      [isAuthenticated]="isAuthenticated">
    </app-header>

    <!-- Main Content Area -->
    <div class="main-content" [class.with-sidebar]="isAuthenticated" [class.with-nav]="shouldShowNavigation">
      <router-outlet></router-outlet>
    </div>

    <!-- Footer (Public Pages) -->
    <app-footer
      *ngIf="shouldShowNavigation && !isAuthenticated"
      class="footer">
    </app-footer>
  </div>
</div>
