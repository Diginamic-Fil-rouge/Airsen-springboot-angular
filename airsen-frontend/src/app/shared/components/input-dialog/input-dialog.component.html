<div *ngIf="isOpen" class="modal-overlay" (click)="onBackdropClick($event)">
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 class="modal-title">{{ title }}</h3>
      <button class="modal-close" (click)="onCancel()" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <p class="modal-message">{{ message }}</p>
      <input
        type="text"
        class="modal-input"
        [(ngModel)]="inputValue"
        [placeholder]="placeholder"
        [required]="required"
        (keydown)="onKeyDown($event)"
        autofocus
      />
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="onCancel()">{{ cancelText }}</button>
      <button
        class="btn btn-primary"
        (click)="onSubmit()"
        [disabled]="required && !inputValue.trim()"
      >
        {{ submitText }}
      </button>
    </div>
  </div>
</div>
