<!-- Skeleton Loader Template -->

<!-- Single Line / Avatar / Badge / Button / Circle -->
<div
  *ngIf="!showMultipleLines"
  [ngClass]="skeletonClass"
  [style.height]="computedHeight"
  [style.width]="computedWidth"
  [style.borderRadius]="computedBorderRadius"
  [style.marginBottom]="showMultipleLines ? lineGap : '0'"
></div>

<!-- Multiple Lines (Paragraph) -->
<div *ngIf="showMultipleLines" class="skeleton-paragraph">
  <div
    *ngFor="let line of lineArray; let last = last"
    [ngClass]="skeletonClass"
    [style.height]="computedHeight"
    [style.width]="line === lineArray.length - 1 ? '80%' : '100%'"
    [style.borderRadius]="computedBorderRadius"
    [style.marginBottom]="!last ? lineGap : '0'"
  ></div>
</div>

<!-- Card Skeleton (special layout) -->
<div *ngIf="type === 'card'" class="skeleton-card">
  <!-- Card Header -->
  <div class="skeleton-card-header">
    <div
      class="skeleton-loader skeleton-circle"
      style="width: 48px; height: 48px; border-radius: 50%; margin-right: 12px"
    ></div>
    <div style="flex: 1">
      <div
        class="skeleton-loader skeleton-line"
        style="height: 16px; width: 60%; margin-bottom: 8px; border-radius: 8px"
      ></div>
      <div
        class="skeleton-loader skeleton-line"
        style="height: 12px; width: 40%; border-radius: 8px"
      ></div>
    </div>
  </div>

  <!-- Card Body -->
  <div class="skeleton-card-body">
    <div
      class="skeleton-loader skeleton-line"
      style="height: 16px; width: 100%; margin-bottom: 12px; border-radius: 8px"
    ></div>
    <div
      class="skeleton-loader skeleton-line"
      style="height: 16px; width: 95%; margin-bottom: 12px; border-radius: 8px"
    ></div>
    <div
      class="skeleton-loader skeleton-line"
      style="height: 16px; width: 85%; border-radius: 8px"
    ></div>
  </div>

  <!-- Card Footer -->
  <div class="skeleton-card-footer">
    <div
      class="skeleton-loader skeleton-badge"
      style="height: 32px; width: 100px; border-radius: 4px"
    ></div>
    <div
      class="skeleton-loader skeleton-badge"
      style="height: 32px; width: 100px; border-radius: 4px"
    ></div>
  </div>
</div>
