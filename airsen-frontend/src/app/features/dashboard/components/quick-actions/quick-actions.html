<section class="quick-actions">
  <button
    class="quick-card"
    type="button"
    *ngFor="let action of actions"
    (click)="onActionClick(action.action)"
  >
    <div class="quick-icon">
      <mat-icon>{{ action.icon }}</mat-icon>
      <span class="quick-badge" *ngIf="action.badge">{{ action.badge }}</span>
    </div>
    <h3 class="quick-title">{{ action.title }}</h3>
    <p class="quick-subtitle">{{ action.subtitle }}</p>
  </button>
</section>
