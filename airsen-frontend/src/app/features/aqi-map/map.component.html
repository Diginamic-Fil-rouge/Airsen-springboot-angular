<div class="aqi-map-container" [class.mobile-view]="isMobileView">
  <!-- Loading Overlay -->
  <div *ngIf="isLoading" class="loading-overlay">
    <mat-spinner diameter="60"></mat-spinner>
    <p class="loading-text">Chargement de la carte de qualité de l'air...</p>
  </div>

  <!-- Main Content -->
  <div class="aqi-map-content" *ngIf="!isLoading">

    <!-- Side Panel (Desktop) / Bottom Sheet (Mobile) -->
    <aside
      class="side-panel"
      [class.open]="isSidePanelOpen"
      [class.mobile]="isMobileView">

      <!-- Panel Header -->
      <div class="panel-header">
        <h1 class="panel-title">
          <mat-icon class="title-icon">air</mat-icon>
          Qualité de l'Air
        </h1>
        <button
          class="panel-toggle-btn"
          (click)="toggleSidePanel()"
          [attr.aria-label]="isSidePanelOpen ? 'Fermer le panneau' : 'Ouvrir le panneau'">
          <mat-icon>{{ isSidePanelOpen ? 'close' : 'menu' }}</mat-icon>
        </button>
      </div>

      <!-- Panel Content -->
      <div class="panel-content">
        <!-- Filters -->
        <app-filter-controls
          (pollutantChanged)="onPollutantChanged($event)"
          (timeRangeChanged)="onTimeRangeChanged($event)"
          (heatmapToggled)="onHeatmapToggled($event)">
        </app-filter-controls>

        <!-- Commune List -->
        <app-station-list
          [stations]="communes"
          [selectedStation]="selectedCommune"
          (stationSelected)="onCommuneSelected($event)">
        </app-station-list>

        <!-- Commune Details (when selected) -->
        <app-station-detail-card
          *ngIf="selectedCommune"
          [station]="selectedCommune"
          (close)="closeCommuneDetails()">
        </app-station-detail-card>
      </div>
    </aside>

    <!-- Map Container -->
    <main class="map-wrapper">
      <!-- Toggle Button (visible when panel is closed) -->
      <button
        *ngIf="!isSidePanelOpen"
        class="panel-open-btn"
        (click)="toggleSidePanel()"
        aria-label="Ouvrir le panneau">
        <mat-icon>menu</mat-icon>
      </button>

      <!-- Map View Component -->
      <app-map-view
        [stations]="communes"
        [selectedStation]="selectedCommune"
        [showHeatmap]="currentFilter?.showHeatmap || false"
        [mapStyle]="currentFilter?.mapStyle || 'STREETS'"
        (stationSelected)="onCommuneSelected($event)"
        #mapView>
      </app-map-view>

      <!-- Map Controls (bottom right) -->
      <div class="map-controls">
        <app-layer-switcher
          (layerChanged)="onLayerChanged($event)"
          class="layer-switcher-control">
        </app-layer-switcher>

        <button class="map-control-btn" matTooltip="Ma position" aria-label="Ma position" (click)="goToUserLocation()">
          <mat-icon>my_location</mat-icon>
        </button>
        <button class="map-control-btn" matTooltip="Zoom avant" aria-label="Zoom avant" (click)="zoomIn()">
          <mat-icon>add</mat-icon>
        </button>
        <button class="map-control-btn" matTooltip="Zoom arrière" aria-label="Zoom arrière" (click)="zoomOut()">
          <mat-icon>remove</mat-icon>
        </button>
      </div>

      <!-- Legend (bottom left) -->
      <div class="map-legend">
        <h4 class="legend-title">Légende</h4>
        <div class="legend-items">
          <div class="legend-item">
            <span class="legend-marker" style="background-color: #00E400;"></span>
            <span class="legend-label">Bon (0-50)</span>
          </div>
          <div class="legend-item">
            <span class="legend-marker" style="background-color: #FFFF00;"></span>
            <span class="legend-label">Moyen (51-100)</span>
          </div>
          <div class="legend-item">
            <span class="legend-marker" style="background-color: #FF7E00;"></span>
            <span class="legend-label">Dégradé (101-150)</span>
          </div>
          <div class="legend-item">
            <span class="legend-marker" style="background-color: #FF0000;"></span>
            <span class="legend-label">Mauvais (151-200)</span>
          </div>
          <div class="legend-item">
            <span class="legend-marker" style="background-color: #8F3F97;"></span>
            <span class="legend-label">Très mauvais (201-300)</span>
          </div>
          <div class="legend-item">
            <span class="legend-marker" style="background-color: #7E0023;"></span>
            <span class="legend-label">Extrêmement mauvais (301+)</span>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
