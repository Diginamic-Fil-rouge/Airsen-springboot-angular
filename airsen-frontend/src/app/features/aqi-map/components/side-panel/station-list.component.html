<div class="station-list">
  <div class="list-header">
    <h3 class="list-title">Communes ({{ filteredAndSortedStations.length }})</h3>

    <!-- Search -->
    <mat-form-field appearance="outline" class="search-field">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput placeholder="Rechercher une commune..." [(ngModel)]="searchQuery">
    </mat-form-field>

    <!-- Sort Controls -->
    <div class="sort-controls">
      <button
        mat-button
        [class.active]="sortBy === 'aqi'"
        (click)="toggleSort('aqi')">
        AQI
        <mat-icon *ngIf="sortBy === 'aqi'">
          {{ sortDirection === 'asc' ? 'arrow_upward' : 'arrow_downward' }}
        </mat-icon>
      </button>
      <button
        mat-button
        [class.active]="sortBy === 'name'"
        (click)="toggleSort('name')">
        Nom
        <mat-icon *ngIf="sortBy === 'name'">
          {{ sortDirection === 'asc' ? 'arrow_upward' : 'arrow_downward' }}
        </mat-icon>
      </button>
      <button
        mat-button
        [class.active]="sortBy === 'population'"
        (click)="toggleSort('population')">
        Population
        <mat-icon *ngIf="sortBy === 'population'">
          {{ sortDirection === 'asc' ? 'arrow_upward' : 'arrow_downward' }}
        </mat-icon>
      </button>
    </div>
  </div>

  <!-- Station Items -->
  <div class="station-items">
    <div
      *ngFor="let station of filteredAndSortedStations"
      class="station-item"
      [class.selected]="selectedStation?.inseeCode === station.inseeCode"
      (click)="onStationClick(station)">

      <div class="station-info">
        <div class="station-name">{{ station.name }}</div>
        <div class="station-meta">
          Pop: {{ (station.population || 0) | number:'':'fr-FR' }}
        </div>
      </div>

      <div class="station-aqi">
        <div
          class="aqi-badge"
          [style.background-color]="getAqiColor(station.aqiLevel)"
          [style.color]="station.aqiLevel === 'MODERATE' ? '#000' : '#fff'">
          {{ station.currentAqi || '?' }}
        </div>
        <div class="aqi-label">{{ getAqiLabel(station.aqiLevel) }}</div>
      </div>
    </div>

    <div *ngIf="filteredAndSortedStations.length === 0" class="empty-state">
      <mat-icon>search_off</mat-icon>
      <p>Aucune commune trouvée</p>
    </div>
  </div>
</div>
