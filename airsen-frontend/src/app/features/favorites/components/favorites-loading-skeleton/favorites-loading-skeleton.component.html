<div class="skeleton-container">
  <div class="skeleton-grid">
    <div *ngFor="let skeleton of skeletonCards" class="skeleton-card">
      <div class="skeleton-header">
        <div class="skeleton-line skeleton-region"></div>
        <div class="skeleton-line skeleton-department"></div>
      </div>
      
      <div class="skeleton-content">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-text"></div>
        <div class="skeleton-line skeleton-text short"></div>
      </div>
      
      <div class="skeleton-actions">
        <div class="skeleton-button skeleton-primary-button"></div>
        <div class="skeleton-button skeleton-icon-button"></div>
      </div>
    </div>
  </div>
</div>
