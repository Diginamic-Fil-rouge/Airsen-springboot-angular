<div class="vote-container">
  <button
    class="vote-button"
    (click)="voteSignal('LIKE')"
    [ngClass]="{ checked: thumbUpChecked }"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
