<div class="map-page">
  <div class="map-layout">
    <app-map-sidebar
      class="map-layout__sidebar"
      [class.overlay-mode]="isOverlayMode"
      [commune]="selectedCommune"
      [open]="isSidebarOpen"
      [displayMode]="sidebarDisplayMode"
      (openChange)="onSidebarOpenChange($event)"
      (clearSelection)="onSidebarClearSelection()"
    ></app-map-sidebar>

    <div class="map-layout__canvas">
      <div class="loading-overlay" *ngIf="isLoading$ | async">
        <mat-spinner diameter="60"></mat-spinner>
        <p>Chargement de la carte...</p>
      </div>

      <app-leaflet-map
        *ngIf="!(isLoading$ | async)"
        [communes]="communes"
        (communeClicked)="onCommuneClicked($event)"
        (zoomChanged)="onMapZoomChanged($event)"
      ></app-leaflet-map>

      <div class="debug-info" *ngIf="communes.length > 0">
        <small>{{ communes.length }} communes chargées</small>
      </div>
    </div>
  </div>

  <button
    mat-fab
    color="primary"
    class="sidebar-toggle"
    *ngIf="isOverlayMode && !isSidebarOpen"
    (click)="openSidebar()"
    aria-label="Afficher les détails de la commune sélectionnée"
  >
    <mat-icon>insights</mat-icon>
  </button>

  <div
    class="sidebar-backdrop"
    *ngIf="isOverlayMode && isSidebarOpen"
    (click)="onSidebarOpenChange(false)"
  ></div>
</div>
