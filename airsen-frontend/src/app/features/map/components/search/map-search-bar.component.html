<mat-card class="map-search-card" appearance="raised">
  <mat-form-field class="search-field" appearance="outline">
    <mat-icon matPrefix>search</mat-icon>
    <input
      matInput
      type="text"
      placeholder="Rechercher une commune"
      [(ngModel)]="searchQuery"
      (ngModelChange)="onInputChanged($event)"
      [matAutocomplete]="auto"
    />
    <button mat-icon-button matSuffix aria-label="Effacer" *ngIf="searchQuery" (click)="clear()">
      <mat-icon>close</mat-icon>
    </button>

    <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayCommune" (optionSelected)="onOptionSelected($event.option.value)">
      <ng-container *ngIf="(searchQuery?.trim()?.length || 0) >= minChars; else minCharsMsg">
        <mat-option *ngFor="let c of filteredCommunes" [value]="c">
          <div class="option-row">
            <span class="name">{{ c.name }}</span>
            <span class="meta">INSEE: {{ c.inseeCode }}</span>
            <span class="dept" *ngIf="c.department?.name">{{ c.department?.name }}</span>
          </div>
        </mat-option>
        <mat-option disabled *ngIf="filteredCommunes.length === 0">Aucun résultat trouvé</mat-option>
      </ng-container>
    </mat-autocomplete>
  </mat-form-field>

  <ng-template #minCharsMsg>
    <div class="validation-hint">Saisissez au moins 2 caractères</div>
  </ng-template>
</mat-card>
