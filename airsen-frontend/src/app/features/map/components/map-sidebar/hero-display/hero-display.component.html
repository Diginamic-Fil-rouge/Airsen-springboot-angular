<div class="hero-display-container" [attr.aria-label]="ariaLabel">
  <!-- Stacked Display: AQI Index above Qualifier -->
  <!-- Static fallback: Shows example data when no real data is available -->
  <div class="aqi-stacked" role="status" [attr.aria-label]="'Indice ATMO ' + displayValue">
    <!-- AQI Value with Background -->
    <!-- Fallback: Green (#4CAF50) for "Bon" (Good) air quality -->
    <div class="aqi-value-stacked" [style.background-color]="color || '#4CAF50'">
      {{ displayValue || '2' }}
    </div>

    <!-- Qualifier Chip -->
    <!-- Fallback: "Bon" (Good) with green background -->
    <div class="qualifier-stacked" [style.background-color]="color || '#4CAF50'"
      [style.color]="getContrastColor(color || '#4CAF50')">
      {{ qualifier || 'Bon' }}
    </div>
  </div>

  <!-- Additional Context -->
  <div class="context-text">
    <p class="subtitle">Indice de qualité de l'air</p>
  </div>

  <!-- Static data example for demo (hidden by default) -->
  <!--
  Example AQI levels with colors:
  - Level 1-2 (Bon/Moyen): #4CAF50 (Green)
  - Level 3 (Dégradé): #FFC107 (Yellow)
  - Level 4 (Mauvais): #FF9800 (Orange)
  - Level 5 (Très mauvais): #F44336 (Red)
  - Level 6 (Extrêmement mauvais): #9C27B0 (Purple)
  -->
</div>
