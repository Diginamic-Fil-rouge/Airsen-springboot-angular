<mat-card class="search-card">
  <mat-form-field appearance="outline" class="search-field">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput type="text" placeholder="Rechercher une commune" />
    <button mat-icon-button matSuffix aria-label="Effacer">
      <mat-icon>close</mat-icon>
    </button>
  </mat-form-field>
</mat-card>
