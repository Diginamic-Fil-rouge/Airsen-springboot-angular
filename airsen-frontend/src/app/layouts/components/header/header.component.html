<!-- Main Header Navigation - Dark Design with Logo and User Actions -->
<header class="header-toolbar" [ngClass]="{ 'header--logged-in': isAuthenticated }">
  <div class="header-container">
    <!-- Logo Section -->
    <div class="logo-section" routerLink="/home" *ngIf="isAuthenticated">
      <span class="logo-text">AIRSEN Logo</span>
    </div>

    <span class="spacer"></span>

    <!-- User Actions Section -->
    <ng-container *ngIf="isAuthenticated; else guestActions">
      <div class="header-actions">
        <!-- Username Display -->
        <span class="user-name">{{ userInitials }}</span>

        <!-- Unread Notifications Badge -->
        <span
          class="notification-badge"
          [attr.aria-label]="'You have ' + unreadNotifications + ' unread notifications'"
          (click)="navigateToAlerts()"
        >
          [{{ unreadNotifications }}]
        </span>

        <!-- Settings Icon Button -->
        <button
          class="header-button settings-button"
          type="button"
          (click)="navigateToProfile()"
          [attr.aria-label]="'Open profile for ' + userDisplayName"
          title="Settings"
        >
          <mat-icon>settings</mat-icon>
        </button>
      </div>
    </ng-container>

    <ng-template #guestActions>
      <div class="login-section">
        <button mat-button (click)="navigateToLogin()" class="login-button">
          Connexion
        </button>
      </div>
    </ng-template>
  </div>
</header>
