<!-- Main Header Navigation - Simplified Design -->
<header class="header-toolbar" [ngClass]="{ 'header--logged-in': isAuthenticated }">
  <div class="header-container">
    <div class="logo-section" routerLink="/home" style="cursor: pointer;">
      <img
        class="logo-image"
        src="assets/images/airsen-logo.png"
        alt="Airsen logo"
      />
    </div>

    <nav class="nav-menu">
      <a routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        Homepage
      </a>
      <ng-container *ngIf="isAuthenticated; else publicLinks">
        <a routerLink="/map" routerLinkActive="active-link">
          Map
        </a>
        <a routerLink="/profile" routerLinkActive="active-link">
          Profile
        </a>
        <a routerLink="/forum" routerLinkActive="active-link">
          Forum
        </a>
        <a
          [routerLink]="['/map']"
          [queryParams]="{ view: 'history' }"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          Historic Data
        </a>
      </ng-container>
    </nav>

    <ng-template #publicLinks>
      <a routerLink="/forum" routerLinkActive="active-link">
        Community
      </a>
    </ng-template>

    <span class="spacer"></span>

    <ng-container *ngIf="isAuthenticated; else guestActions">
      <div class="header-actions">
        <button
          class="header-button icon-button"
          type="button"
          [matBadge]="unreadNotifications"
          [matBadgeHidden]="!unreadNotifications"
          matBadgeColor="warn"
          aria-label="Notifications"
          (click)="navigateToAlerts()"
        >
          <mat-icon>notifications</mat-icon>
        </button>

        <button
          class="header-button avatar-button"
          type="button"
          (click)="navigateToProfile()"
          [attr.aria-label]="'Open profile for ' + userDisplayName"
        >
          <span class="user-avatar">{{ userInitials }}</span>
        </button>

        <button class="header-button logout-button" type="button" (click)="onLogout()">
          Logout
        </button>
      </div>
    </ng-container>

    <ng-template #guestActions>
      <div class="login-section">
        <button mat-button (click)="navigateToLogin()" class="login-button">
          Connexion
        </button>
      </div>
    </ng-template>
  </div>
</header>
