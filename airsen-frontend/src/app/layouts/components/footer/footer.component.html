<footer class="app-footer">
  <ng-container *ngIf="!isAuthenticated; else authenticatedFooter">
    <div class="footer-container">
      <div class="footer-branding">
        <img
          class="brand-logo"
          src="assets/images/airsen-logo.png"
          alt="Airsen logo"
        />
        <span class="brand-name">Airsen</span>
      </div>
      <nav class="footer-links" aria-label="Liens de bas de page">
        <a routerLink="/legal/privacy" class="footer-link">Privacy</a>
        <span class="separator">•</span>
        <a routerLink="/legal/terms" class="footer-link">Terms</a>
        <span class="separator">•</span>
        <a routerLink="/contact" class="footer-link">Contact</a>
      </nav>
    </div>
  </ng-container>

  <ng-template #authenticatedFooter>
    <div class="footer-container footer-container--auth">
      <div class="footer-branding">
        <img
          class="brand-logo"
          src="assets/images/airsen-logo.png"
          alt="Airsen logo"
        />
        <div class="brand-text">
          <span class="brand-name">Airsen</span>
          <span class="eco-statement">Acting together for cleaner cities</span>
        </div>
      </div>

      <nav class="footer-links" aria-label="Liens de bas de page authentifiés">
        <a routerLink="/legal/privacy" class="footer-link">Privacy</a>
        <span class="separator">•</span>
        <a routerLink="/legal/terms" class="footer-link">Terms</a>
        <span class="separator">•</span>
        <a routerLink="/contact" class="footer-link">Contact</a>
        <span class="separator">•</span>
        <a routerLink="/legal/accessibility" class="footer-link">Accessibility</a>
      </nav>
    </div>
  </ng-template>
</footer>
