version: "3.9"

name: airsen

x-common: &common
  networks: [ airsen_net ]
  restart: unless-stopped

services:
  # SHARED INFRASTRUCTURE
  mariadb:
    <<: *common
    image: mariadb:11.6
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATE_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL","mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    <<: *common
    image: redis:7.4-alpine
    command: ["redis-server","--appendonly","yes","--maxmemory","256mb","--maxmemory-policy","allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # DEVELOPMENT SERVICES
  api-dev:
    <<: *common
    profiles: ["dev"]
    build:
      context: ./airsen-backend
      dockerfile: Dockerfile
      target: development
    image: airsen-api-dev
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      JWT_SECRET: ${JWT_SECRET}
      LOGGING_LEVEL_COM_AIRSEN: DEBUG
    command: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Xms256m -Xmx512m"
    volumes:
      - ./airsen-backend:/app
      - maven_cache:/home/spring/.m2
    ports:
      - "8080:8080"
      - "5005:5005"  # Debug port
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  web-dev:
    <<: *common
    profiles: ["dev"]
    build:
      context: ./airsen-frontend
      dockerfile: Dockerfile
      target: development
    image: airsen-web-dev
    working_dir: /usr/src/app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NG_CLI_ANALYTICS: "false"
      API_BASE_URL: http://localhost:8080
    command: sh -c "npm ci && npx ng serve --host 0.0.0.0 --port 4200 --poll 2000"
    volumes:
      - ./airsen-frontend:/usr/src/app
      - node_modules_cache:/usr/src/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - api-dev
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # PRODUCTION SERVICES
  api:
    <<: *common
    profiles: ["prod"]
    build:
      context: ./airsen-backend
      dockerfile: Dockerfile
      target: production
    image: airsen-api:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_COM_AIRSEN: INFO
    expose:
      - "8080"
    healthcheck:
      test: ["CMD","java","-cp","/app/app.jar","org.springframework.boot.loader.JarLauncher","--spring.main.web-environment=false"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M

  web:
    <<: *common
    profiles: ["prod"]
    build:
      context: ./airsen-frontend
      dockerfile: Dockerfile
      target: production
    image: airsen-web:latest
    expose:
      - "80"
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  nginx:
    <<: *common
    profiles: ["prod"]
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Uncomment for HTTPS
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:80"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # OPTIONAL DEVELOPMENT TOOLS
  redis-commander:
    <<: *common
    profiles: ["dev"]
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis

networks:
  airsen_net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  maven_cache:
  node_modules_cache: