version: "3.8"

name: airsen

x-common: &common
  networks: [ airsen_net ]
  restart: unless-stopped

services:
  # SHARED INFRASTRUCTURE
  mariadb:
    <<: *common
    image: mariadb:11.6
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATE_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL","mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    <<: *common
    image: redis:7.4-alpine
    command: ["redis-server","--appendonly","yes","--maxmemory","256mb","--maxmemory-policy","allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # DEVELOPMENT BACKEND - Hot Reload with DevTools
  api-dev:
    <<: *common
    profiles: ["dev"]
    build:
      context: ./airsen-backend
      dockerfile: Dockerfile
      target: development
    image: airsen-api:dev
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      LOGGING_LEVEL_COM_AIRSEN: ${LOG_LEVEL}

      # External APIs
      ATMO_API_URL: ${ATMO_API_URL}
      ATMO_USERNAME: ${ATMO_USERNAME}
      ATMO_PASSWORD: ${ATMO_PASSWORD}
      OPEN_METEO_URL: ${OPEN_METEO_URL}
      INSEE_API_URL: ${INSEE_API_URL}

      # Email configuration
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    volumes:
      # MINIMAL BIND MOUNTS - Only source code and pom.xml
      - ./airsen-backend/src:/app/src:ro
      - ./airsen-backend/pom.xml:/app/pom.xml:ro
      # Writable volume for Maven target directory
      - ./airsen-backend/target:/app/target
      # Maven cache to speed up builds
      - maven_cache:/root/.m2/repository
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  # DEVELOPMENT FRONTEND - Live Reload with Angular CLI
  web-dev:
    <<: *common
    profiles: ["dev"]
    build:
      context: ./airsen-frontend
      dockerfile: Dockerfile
      target: development
    image: airsen-web:dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      NG_CLI_ANALYTICS: "false"
      API_BASE_URL: ${API_BASE_URL}
      NODE_OPTIONS: "--max-old-space-size=2048"
    volumes:
      # MINIMAL BIND MOUNTS - Only source code and config files
      - ./airsen-frontend/src:/app/src:ro
      - ./airsen-frontend/angular.json:/app/angular.json:ro
      - ./airsen-frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./airsen-frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./airsen-frontend/tsconfig.spec.json:/app/tsconfig.spec.json:ro
      - ./airsen-frontend/package.json:/app/package.json:ro
      - ./airsen-frontend/package-lock.json:/app/package-lock.json:ro
      # Cache node_modules (persist between rebuilds)
      - node_modules_cache:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - api-dev
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M

  # PRODUCTION BACKEND
  api:
    <<: *common
    profiles: ["prod"]
    build:
      context: ./airsen-backend
      dockerfile: Dockerfile
      target: production
    image: airsen-api:prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      JWT_SECRET: ${JWT_SECRET}
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_COM_AIRSEN: INFO

      ATMO_API_URL: ${ATMO_API_URL}
      ATMO_USERNAME: ${ATMO_USERNAME}
      ATMO_PASSWORD: ${ATMO_PASSWORD}
      OPEN_METEO_URL: ${OPEN_METEO_URL}
      INSEE_API_URL: ${INSEE_API_URL}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M

  # PRODUCTION FRONTEND
  web:
    <<: *common
    profiles: ["prod"]
    build:
      context: ./airsen-frontend
      dockerfile: Dockerfile
      target: production
    image: airsen-web:prod
    environment:
      API_BASE_URL: http://api:8080
    expose:
      - "80"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # PRODUCTION NGINX REVERSE PROXY
  nginx:
    <<: *common
    profiles: ["prod"]
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:80"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # OPTIONAL DEVELOPMENT TOOLS
  redis-commander:
    <<: *common
    profiles: ["dev"]
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis

networks:
  airsen_net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  maven_cache:
  node_modules_cache:
