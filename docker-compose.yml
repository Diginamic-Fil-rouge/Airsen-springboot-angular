
name: airsen

x-common: &common
  networks: [ airsen_net ]
  restart: unless-stopped

services:
  # SHARED INFRASTRUCTURE
  mariadb:
    <<: *common
    image: mariadb:11.6
    profiles: ["backend", "full-stack"]
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATE_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL","mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    <<: *common
    image: redis:7.4-alpine
    profiles: ["backend", "full-stack"]
    command: ["redis-server","--appendonly","yes","--maxmemory","256mb","--maxmemory-policy","allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # BACKEND
  api:
    <<: *common
    profiles: ["backend", "full-stack"]
    build:
      context: ./airsen-backend
      dockerfile: Dockerfile
      target: ${API_TARGET}
    image: airsen-api:${API_TARGET}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      LOGGING_LEVEL_COM_AIRSEN: ${LOG_LEVEL}
      ATMO_API_URL: ${ATMO_API_URL}
      ATMO_USERNAME: ${ATMO_USERNAME}
      ATMO_PASSWORD: ${ATMO_PASSWORD}
      OPEN_METEO_URL: ${OPEN_METEO_URL}
      INSEE_API_URL: ${INSEE_API_URL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    volumes:
      - ./airsen-backend/src:/app/src:ro
      - ./airsen-backend/pom.xml:/app/pom.xml:ro
      - ./airsen-backend/target:/app/target
      - maven_cache:/root/.m2/repository
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  # FRONTEND
  web:
    <<: *common
    profiles: ["frontend", "full-stack"]
    build:
      context: ./airsen-frontend
      dockerfile: Dockerfile
      target: ${WEB_TARGET}
    image: airsen-web:${WEB_TARGET}
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: "true"
      NG_CLI_ANALYTICS: "false"
      API_BASE_URL: ${API_BASE_URL}
      NODE_OPTIONS: "--max-old-space-size=2048"
    volumes:
      - ./airsen-frontend/src:/app/src:ro
      - ./airsen-frontend/angular.json:/app/angular.json:ro
      - ./airsen-frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./airsen-frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./airsen-frontend/tsconfig.spec.json:/app/tsconfig.spec.json:ro
      - ./airsen-frontend/package.json:/app/package.json:ro
      - ./airsen-frontend/package-lock.json:/app/package-lock.json:ro
      - node_modules_cache:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - api

  # PRODUCTION NGINX REVERSE PROXY
  nginx:
    <<: *common
    profiles: ["prod"]
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:80"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # OPTIONAL DEVELOPMENT TOOLS
  redis-commander:
    <<: *common
    profiles: ["dev"]
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis

networks:
  airsen_net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  maven_cache:
  node_modules_cache:
