name: PR Checks

on:
  pull_request:
    branches:
      - '*'

jobs:
  backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: airsen-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

  frontend:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: airsen-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: airsen-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

  pr-title:
    name: PR Title Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! [[ "$PR_TITLE" =~ ^(feat|fix|docs|refactor|test|feature)\: ]]; then
            echo "PR title must start with feat:, fix:, docs:, refactor:, feature: or test:"
            echo "Current title: $PR_TITLE"
            exit 1
          fi
