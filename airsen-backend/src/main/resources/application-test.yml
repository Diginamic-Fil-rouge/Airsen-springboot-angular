# Test Profile Configuration
# This profile is designed for automated testing with NO external API calls
spring:
  config:
    activate:
      on-profile: test

  # Disable DevTools during testing
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  # Test Database Configuration - Use H2 in-memory or TestContainers
  datasource:
    # Override with H2 for unit tests (can be overridden by TestContainers)
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false  # Reduce test output noise
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  # DISABLE CACHE FOR PREDICTABLE TEST RESULTS
  cache:
    type: none

  # Disable mail during tests
  mail:
    host: localhost
    port: 3025  # Fake SMTP for tests
    test-connection: false

# DISABLE ALL SCHEDULING DURING TESTS
scheduling:
  # Master switch - ALWAYS false in test profile
  enabled: false

  atmo:
    cron: "0 0 0 1 1 ? 2099"  # Never run (year 2099)
    timezone: Europe/Paris
    batch-size: 5  # Small for test data

  weather:
    cron: "0 0 0 1 1 ? 2099"  # Never run (year 2099)
    timezone: Europe/Paris
    batch-size: 5
    delay-between-batches-ms: 100
    delay-between-requests-ms: 100
    sample-size: 5  # Very small sample for tests

# Cache refresh - DISABLED
cache:
  refresh:
    air-quality-cron: "0 0 0 1 1 ? 2099"
    weather-cron: "0 0 0 1 1 ? 2099"
    statistics-cron: "0 0 0 1 1 ? 2099"
    cleanup-cron: "0 0 0 1 1 ? 2099"

# Tiered scheduler - DISABLED
tiered-scheduler:
  enabled: false

# Alert detection - DISABLED
alert:
  detection:
    enabled: false
    cron: "0 0 0 1 1 ? 2099"

# Rate limiter - Permissive for tests (no real API calls anyway)
rate-limiter:
  burst-capacity-percentage: 20

  atmo:
    requests-per-minute: 1000
    reject-on-limit: false
    circuit-breaker:
      failure-threshold: 0.9  # Very permissive for tests
      wait-duration-seconds: 1
      permitted-calls-half-open: 100

  weather:
    requests-per-minute: 1000
    reject-on-limit: false
    circuit-breaker:
      failure-threshold: 0.9
      wait-duration-seconds: 1
      permitted-calls-half-open: 100

  insee:
    requests-per-minute: 1000
    reject-on-limit: false
    circuit-breaker:
      failure-threshold: 0.9
      wait-duration-seconds: 1
      permitted-calls-half-open: 100

# External API Configuration - MOCK MODE
external:
  # ATMO API - Mock configuration
  atmo-api:
    # Use mock server URL (WireMock or MockServer)
    baseUrl: ${ATMO_MOCK_URL:http://localhost:${wiremock.server.port:8089}}
    jwtToken: "mock-jwt-token-for-testing"
    username: "test-user"
    password: "test-password"
    timeoutMs: 5000
    retryAttempts: 1  # No retries in tests for faster failures
    mock-enabled: ${ATMO_MOCK_ENABLED:true}
    log-requests: false
    log-responses: false

  # OpenMeteo API - Mock configuration
  open-meteo:
    base-url: ${OPEN_METEO_MOCK_URL:http://localhost:${wiremock.server.port:8089}}
    timeout-ms: 5000
    retry-attempts: 1
    mock-enabled: ${OPEN_METEO_MOCK_ENABLED:true}
    log-requests: false
    log-responses: false

  # INSEE API - Mock configuration
  insee-api:
    base-url: ${INSEE_MOCK_URL:http://localhost:${wiremock.server.port:8089}}
    timeout-ms: 5000
    retry-attempts: 1
    mock-enabled: ${INSEE_MOCK_ENABLED:true}
    log-requests: false
    log-responses: false

# Logging Configuration - Minimal output for tests
logging:
  level:
    root: WARN
    fr.airsen.api: INFO
    # Suppress scheduler logs completely
    fr.airsen.api.scheduler: WARN
    # Only show errors from services
    fr.airsen.api.service: WARN
    # Show external API errors (useful for debugging mock issues)
    fr.airsen.api.external.client: INFO
    # Suppress cache logs
    org.springframework.cache: WARN
    org.springframework.data.redis: WARN
    # Suppress SQL logs
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    # Suppress HTTP client logs
    org.springframework.web.reactive.function.client: WARN
    reactor.core.publisher: WARN
    # Show test-specific logs
    fr.airsen.api.test: DEBUG

  # Use console logging with pattern suitable for test output
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management endpoints - Limited in test
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Test-specific Configuration
test:
  # Use fixed data for reproducible tests
  use-fixed-data: true

  # Sample test data configuration
  sample-data:
    communes: 5
    weather-records: 10
    air-quality-records: 10

  # Mock server configuration
  mock:
    enabled: true
    port: ${wiremock.server.port:8089}
    # Simulate API delays in tests (ms)
    simulate-delay: ${MOCK_DELAY:0}
    # Simulate failures for testing error handling
    simulate-failures: ${MOCK_FAILURES:false}
    failure-rate: 0.1  # 10% failure rate when enabled

# WireMock Configuration (for integration tests)
wiremock:
  server:
    port: 0  # Random port
    # Record HTTP interactions for later playback
    record: false
    # Stub configurations
    stubs:
      # ATMO API stubs
      atmo:
        - request:
            method: GET
            urlPattern: "/air-quality.*"
          response:
            status: 200
            jsonBody:
              data:
                - code_commune: "75056"
                  indice: 3
                  date_ech: "2025-11-07"
                  lib_qual: "Moyen"

      # OpenMeteo API stubs
      weather:
        - request:
            method: GET
            urlPattern: "/forecast.*"
          response:
            status: 200
            jsonBody:
              current_weather:
                temperature: 20.5
                windspeed: 12.3
                weathercode: 0

      # INSEE API stubs
      insee:
        - request:
            method: GET
            urlPattern: "/communes.*"
          response:
            status: 200
            jsonBody:
              - code: "75056"
                nom: "Paris"
                population: 2165423

# Security - Relaxed for testing
spring:
  security:
    jwt:
      secret: "test-secret-key-for-junit-tests-minimum-256-bits-required-for-hs256-algorithm"
      expiration: 3600000  # 1 hour
      refresh-expiration: 7200000  # 2 hours
      clock-skew: 300

# Testing Best Practices Documentation
# =====================================
# IMPORTANT: This profile is for AUTOMATED TESTING ONLY
#
# Key features:
# 1. ALL scheduling is disabled
# 2. External APIs are mocked using WireMock
# 3. In-memory H2 database for fast tests
# 4. No Redis cache (predictable results)
# 5. Minimal logging output
#
# Test Types and Configuration:
#
# 1. UNIT TESTS (@SpringBootTest with mocked dependencies)
#    - Don't load this profile
#    - Use @MockBean for services
#
# 2. INTEGRATION TESTS (@SpringBootTest(webEnvironment = RANDOM_PORT))
#    - Use @ActiveProfiles("test")
#    - WireMock auto-configured via @AutoConfigureWireMock
#    - Example:
#      @SpringBootTest
#      @ActiveProfiles("test")
#      @AutoConfigureWireMock(port = 0)
#      class AtmoIntegrationTest { ... }
#
# 3. SLICE TESTS (@WebMvcTest, @DataJpaTest, etc.)
#    - These automatically exclude scheduling
#    - No need for special configuration
#
# 4. TESTCONTAINERS (for MariaDB/Redis integration tests)
#    - Override datasource/redis properties
#    - Example:
#      @Container
#      static MariaDBContainer mariaDB = new MariaDBContainer("mariadb:10.6");
#
#      @DynamicPropertySource
#      static void properties(DynamicPropertyRegistry registry) {
#        registry.add("spring.datasource.url", mariaDB::getJdbcUrl);
#      }
#
# Mock Data Guidelines:
# - Keep test data minimal (5-10 records)
# - Use fixed timestamps for reproducibility
# - Mock external API responses in test classes
# - Use @MockBean sparingly (prefer real beans with mocked HTTP)
#
# Example Test Configuration:
#
# @SpringBootTest
# @ActiveProfiles("test")
# @AutoConfigureWireMock(port = 0)
# class WeatherServiceIntegrationTest {
#
#   @Autowired
#   private WeatherService weatherService;
#
#   @Test
#   void shouldFetchWeatherFromMockApi() {
#     // WireMock stubs are already configured from this YAML
#     WeatherData result = weatherService.getCurrentWeather(48.8566, 2.3522);
#     assertThat(result.getTemperature()).isEqualTo(20.5);
#   }
# }
#
# Environment Variables for Test Control:
# - ATMO_MOCK_ENABLED=true (use mock instead of real API)
# - OPEN_METEO_MOCK_ENABLED=true
# - MOCK_DELAY=100 (simulate 100ms API latency)
# - MOCK_FAILURES=true (test error handling)
