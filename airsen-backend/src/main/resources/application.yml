# Default configuration - Environment-agnostic settings
# Profile-specific settings are in application-{profile}.yml
spring:
  application:
    name: airsen-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  devtools:
    restart:
      enabled: true # Enable automatic restart
      poll-interval: 2000 # Check for file changes every 2 seconds
      quiet-period: 1000 # Wait 1 second after last change before restart
      additional-paths:
        - src/main/java # Monitor source directory
      exclude: static/**,public/** # Don't restart on static file changes
    livereload:
      enabled: false # Disable LiveReload in Docker (browser refresh)
    remote:
      restart:
        enabled: false # Disable remote restart for security

  # Database Configuration - MariaDB
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000

  # JPA Configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        use_sql_comments: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour default
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "airsen:"

  # Jackson JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
      accept-single-value-as-array: true
    default-property-inclusion: non_null
    time-zone: Europe/Paris

  # Security Configuration
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 86400000 # 24 hours
      refresh-expiration: 604800000 # 7 days
      clock-skew: 300 # 5 minutes tolerance
      issuer: airsen-api

  # Email Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
    protocol: smtp
    test-connection: false

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api/v1

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when-authorized
    caches:
      enabled: true
  metrics:
    enable:
      cache: true
    cache:
      instrument-cache: true
  health:
    redis:
      enabled: true

# External APIs Configuration
external:
  atmo-api:
    baseUrl: ${ATMO_API_URL:https://admindata.atmo-france.org}
    jwtToken: ${ATMO_JWT_TOKEN:}
    username: ${ATMO_USERNAME:}
    password: ${ATMO_PASSWORD:}
    timeoutMs: 10000
    retryAttempts: 3

  open-meteo:
    base-url: ${OPEN_METEO_URL}
    timeout-ms: 20000 # Increased to 15 seconds to handle slower external API responses
    retry-attempts: 3

  insee-api:
    base-url: ${INSEE_API_URL}
    timeout-ms: 5000
    retry-attempts: 3

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    disable-swagger-default-url: true

# Scheduling Configuration
# NOTE: These are base defaults. Override in application-{profile}.yml for environment-specific settings
# - application-dev.yml: Relaxed schedules (weekly), small samples, disabled by default
# - application-test.yml: All scheduling disabled, mock APIs
# - application-prod.yml: Full schedules enabled, optimized settings
scheduling:
  enabled: ${ENABLE_SCHEDULING:true}  # Master switch to enable/disable all scheduling

  atmo:
    cron: ${ATMO_SCHEDULE_CRON:0 0 10 * * *} # Default: 10:00 AM daily
    timezone: ${ATMO_SCHEDULE_TIMEZONE:Europe/Paris}

  weather:
    cron: ${WEATHER_SCHEDULE_CRON:0 30 10 * * *} # Default: 10:30 AM daily (30 min after ATMO)
    timezone: ${WEATHER_SCHEDULE_TIMEZONE:Europe/Paris}
    batch-size: ${WEATHER_BATCH_SIZE:100}
    delay-between-batches-ms: ${WEATHER_BATCH_DELAY:60000}  # 1 minute
    delay-between-requests-ms: ${WEATHER_REQUEST_DELAY:6000}  # 6 seconds (~10 requests/min)

# Custom application email settings
airsen:
  mail:
    from:
      address: ${MAIL_FROM_ADDRESS:noreply@airsen.fr}
      name: ${MAIL_FROM_NAME:Airsen Air Quality System}

# Profile-specific configurations are now in separate files:
# - application-dev.yml: Development settings (relaxed schedules, verbose logging)
# - application-test.yml: Testing settings (disabled scheduling, mocked APIs)
# - application-prod.yml: Production settings (full schedules, optimized performance)
#
# To activate a profile, set SPRING_PROFILES_ACTIVE environment variable:
# - Development: SPRING_PROFILES_ACTIVE=dev (default)
# - Testing: SPRING_PROFILES_ACTIVE=test
# - Production: SPRING_PROFILES_ACTIVE=prod
#
# For development with scheduling disabled:
# SPRING_PROFILES_ACTIVE=dev ENABLE_SCHEDULING=false
